<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeTeach Dino</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <h1>VibeTeach Dino</h1>
      <p class="hint">A tiny Dino-style game built in small teaching stages.</p>
      <p class="controls" aria-label="How to play">
        Controls: <strong>Space</strong> / <strong>Arrow Up</strong> to jump, avoid the obstacle,
        press jump again after game over to restart.
      </p>

      <section class="game-shell" aria-label="Game area">
        <canvas id="gameCanvas" width="800" height="240"></canvas>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
